      <title>notchX</title>
      <style>html, body, #root { height: 100%; margin: 0; background: transparent; }</style>
    
    <style>
      @keyframes notchx-bar {
        from { transform: scaleY(var(--scale-from)); }
        to { transform: scaleY(var(--scale-to)); }
      }
      @keyframes marquee {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
      }
    </style>
